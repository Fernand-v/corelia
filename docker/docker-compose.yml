services:
  postgres:
    image: postgres:16-alpine
    container_name: corelia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    command: ["postgres", "-c", "password_encryption=scram-sha-256", "-c", "listen_addresses=*"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?Set POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: corelia-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: corelia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # ports:
    #   - "${MINIO_API_PORT:-9000}:9000"
    #   - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: corelia-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set corelia http://minio:9000 ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD};
      mc mb -p corelia/${MINIO_BUCKET:-corelia-files} || true;
      mc anonymous set none corelia/${MINIO_BUCKET:-corelia-files};
      exit 0;
      "

  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: corelia-meilisearch
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-}
    volumes:
      - meilisearch_data:/meili_data
    # ports:
    #   - "${MEILISEARCH_PORT:-7700}:7700"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: corelia-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # ports:
    #   - "9090:9090"

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: corelia-redis-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: corelia-postgres-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}?sslmode=disable

  grafana:
    image: grafana/grafana:11.4.0
    container_name: corelia-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      - prometheus
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: corelia-tempo
    restart: unless-stopped
    profiles: ["monitoring"]
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    # ports:
    #   - "3200:3200"
    #   - "4318:4318"

  # One-shot migration runner: applies `prisma migrate deploy` exactly once
  # before the API (and any replicas) start. Keeping migrations out of the API
  # boot avoids races when scaling the API to multiple instances.
  migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: runner
      args:
        PNPM_VERSION: ${PNPM_VERSION:-9.12.3}
        PRISMA_CLI_VERSION: ${PRISMA_CLI_VERSION:-6.19.2}
    image: corelia-api:local
    container_name: corelia-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}?schema=public
    command: ["prisma", "migrate", "deploy", "--schema", "apps/api/prisma/schema.prisma"]

  api:
    image: corelia-api:local
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: runner
      args:
        PNPM_VERSION: ${PNPM_VERSION:-9.12.3}
        PRISMA_CLI_VERSION: ${PRISMA_CLI_VERSION:-6.19.2}
    container_name: corelia-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      COLLAB_AUTH_SECRET: ${COLLAB_AUTH_SECRET:?Set COLLAB_AUTH_SECRET}
      CORELIA_APP_URL: ${CORELIA_APP_URL:-https://localhost}
      ONLYOFFICE_CALLBACK_BASE_URL: ${ONLYOFFICE_CALLBACK_BASE_URL:-http://nginx}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CORS_ALLOW_PRIVATE_NETWORK: ${CORS_ALLOW_PRIVATE_NETWORK:-false}
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 30
      # Migrations are applied by the dedicated `migrate` service above, so the
      # API must not migrate on boot (prevents multi-instance races).
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-false}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-corelia-files}
      DOCUMENTS_PRESENCE_TTL_SECONDS: ${DOCUMENTS_PRESENCE_TTL_SECONDS:-70}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-}
      ONLYOFFICE_INTERNAL_URL: ${ONLYOFFICE_INTERNAL_URL:-http://onlyoffice}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: false
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER}
      SMTP_PASS: ${SMTP_PASS:?Set SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:?Set SMTP_FROM}
      MAINTENANCE_DEFAULT_MESSAGE: ${MAINTENANCE_DEFAULT_MESSAGE:-Corelia está en mantenimiento}
      SOCKET_IO_ENABLED: ${SOCKET_IO_ENABLED:-true}
      SOCKET_IO_PATH: ${SOCKET_IO_PATH:-/ws/socket.io}
      MEDIA_SERVER_ENABLED: ${MEDIA_SERVER_ENABLED:-true}
      MEDIA_MAX_PARTICIPANTS: ${MEDIA_MAX_PARTICIPANTS:-20}
      MEDIA_LISTEN_IP: ${MEDIA_LISTEN_IP:-0.0.0.0}
      MEDIA_ANNOUNCED_IP: ${MEDIA_ANNOUNCED_IP:-host.docker.internal}
      MEDIA_MIN_PORT: ${MEDIA_MIN_PORT:-40000}
      MEDIA_MAX_PORT: ${MEDIA_MAX_PORT:-40100}
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-}
      MICROSOFT_CALENDAR_CLIENT_ID: ${MICROSOFT_CALENDAR_CLIENT_ID:-}
      MICROSOFT_CALENDAR_CLIENT_SECRET: ${MICROSOFT_CALENDAR_CLIENT_SECRET:-}
      MICROSOFT_CALENDAR_REDIRECT_URI: ${MICROSOFT_CALENDAR_REDIRECT_URI:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      WEB_PUSH_ENABLED: ${WEB_PUSH_ENABLED:-false}
      WEB_PUSH_VAPID_SUBJECT: ${WEB_PUSH_VAPID_SUBJECT:-}
      WEB_PUSH_VAPID_PUBLIC_KEY: ${WEB_PUSH_VAPID_PUBLIC_KEY:-}
      WEB_PUSH_VAPID_PRIVATE_KEY: ${WEB_PUSH_VAPID_PRIVATE_KEY:-}
      MEILISEARCH_ENABLED: ${MEILISEARCH_ENABLED:-true}
      MEILISEARCH_URL: ${MEILISEARCH_URL_DOCKER:-http://meilisearch:7700}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-}
      MEILISEARCH_INDEX: ${MEILISEARCH_INDEX:-corelia-global-search}
      MEILISEARCH_BOOTSTRAP_ON_START: ${MEILISEARCH_BOOTSTRAP_ON_START:-true}
      OTEL_ENABLED: ${OTEL_ENABLED_DOCKER:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME_API:-corelia-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT_DOCKER:-http://tempo:4318}
      GRAFANA_URL: ${GRAFANA_URL:-/grafana}
    # Port 4000 is intentionally not exposed externally — access via nginx only
    # ports:
    #   - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/status').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        PNPM_VERSION: ${PNPM_VERSION:-9.12.3}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_DOCKER:-/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL_DOCKER:-}
        NEXT_PUBLIC_SOCKET_PATH: /ws/socket.io
        NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL_DOCKER:-/collab}
        NEXT_PUBLIC_DOCS_DEBUG: ${NEXT_PUBLIC_DOCS_DEBUG:-false}
    container_name: corelia-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"

  hocuspocus:
    build:
      context: ..
      dockerfile: apps/hocuspocus/Dockerfile
    container_name: corelia-hocuspocus
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOCUSPOCUS_HOST: ${HOCUSPOCUS_HOST:-0.0.0.0}
      HOCUSPOCUS_PORT: ${HOCUSPOCUS_PORT:-1234}
      HOCUSPOCUS_QUIET: ${HOCUSPOCUS_QUIET:-false}
      COLLAB_AUTH_SECRET: ${COLLAB_AUTH_SECRET:?Set COLLAB_AUTH_SECRET}
    # ports:
    #   - "1234:1234"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${HOCUSPOCUS_PORT:-1234} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  onlyoffice:
    image: onlyoffice/documentserver:9.3.1
    container_name: corelia-onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?Set ONLYOFFICE_JWT_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 10

  workers:
    build:
      context: ..
      dockerfile: apps/workers/Dockerfile
    container_name: corelia-workers
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[n]ode' | grep -qv grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: false
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER}
      SMTP_PASS: ${SMTP_PASS:?Set SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:?Set SMTP_FROM}
      WEB_PUSH_ENABLED: ${WEB_PUSH_ENABLED:-false}
      WEB_PUSH_VAPID_SUBJECT: ${WEB_PUSH_VAPID_SUBJECT:-}
      WEB_PUSH_VAPID_PUBLIC_KEY: ${WEB_PUSH_VAPID_PUBLIC_KEY:-}
      WEB_PUSH_VAPID_PRIVATE_KEY: ${WEB_PUSH_VAPID_PRIVATE_KEY:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-corelia-files}
      DOCUMENTS_PURGE_INTERVAL_MINUTES: ${DOCUMENTS_PURGE_INTERVAL_MINUTES:-60}
      OTEL_ENABLED: ${OTEL_ENABLED_DOCKER:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME_WORKERS:-corelia-workers}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT_DOCKER:-http://tempo:4318}

  nginx:
    image: nginx:1.27-alpine
    container_name: corelia-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
      - hocuspocus
      - onlyoffice
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_SSL_CERT_PATH:?Set NGINX_SSL_CERT_PATH}:/etc/nginx/certs/corelia.crt:ro
      - ${NGINX_SSL_KEY_PATH:?Set NGINX_SSL_KEY_PATH}:/etc/nginx/certs/corelia.key:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  tempo_data:
  prometheus_data:
  grafana_data:
