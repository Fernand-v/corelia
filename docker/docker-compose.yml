services:
  postgres:
    image: postgres:16
    container_name: corelia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-corelia}
      POSTGRES_USER: ${POSTGRES_USER:-corelia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0bdd43b2d74c99a4088e92d74a5eafc62bf503e8b899daef}
    command: ["postgres", "-c", "password_encryption=scram-sha-256", "-c", "listen_addresses=*"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corelia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: corelia-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-corelia_redis_pwd}"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-corelia_redis_pwd}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: corelia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-coreliaadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-corelia_minio_pwd_123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set corelia http://minio:9000 ${MINIO_ROOT_USER:-coreliaadmin} ${MINIO_ROOT_PASSWORD:-corelia_minio_pwd_123};
      mc mb -p corelia/${MINIO_BUCKET:-corelia-files} || true;
      mc anonymous set none corelia/${MINIO_BUCKET:-corelia-files};
      exit 0;
      "

  tempo:
    image: grafana/tempo:2.6.1
    container_name: corelia-tempo
    restart: unless-stopped
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4318:4318"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: runner
      args:
        PNPM_VERSION: ${PNPM_VERSION:-9.12.3}
        PRISMA_CLI_VERSION: ${PRISMA_CLI_VERSION:-6.19.2}
    container_name: corelia-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      tempo:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-corelia}:${POSTGRES_PASSWORD:-0bdd43b2d74c99a4088e92d74a5eafc62bf503e8b899daef}@postgres:5432/${POSTGRES_DB:-corelia}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-corelia_redis_pwd}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-corelia_access_secret_change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-corelia_refresh_secret_change_me}
      API_KEY: ${API_KEY:-0b142799e2fb202684f31eff9ea71965d84e81a4b7a58adb6e90d704165f9773}
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 30
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-true}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-coreliaadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-corelia_minio_pwd_123}
      MINIO_BUCKET: ${MINIO_BUCKET:-corelia-files}
      DOCUMENTS_PRESENCE_TTL_SECONDS: ${DOCUMENTS_PRESENCE_TTL_SECONDS:-70}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: false
      SMTP_USER: ${SMTP_USER:-corelia}
      SMTP_PASS: ${SMTP_PASS:-corelia}
      SMTP_FROM: ${SMTP_FROM:-noreply@corelia.local}
      MAINTENANCE_DEFAULT_MESSAGE: ${MAINTENANCE_DEFAULT_MESSAGE:-Corelia está en mantenimiento}
      SOCKET_IO_ENABLED: ${SOCKET_IO_ENABLED:-true}
      SOCKET_IO_PATH: ${SOCKET_IO_PATH:-/ws/socket.io}
      MEDIA_SERVER_ENABLED: ${MEDIA_SERVER_ENABLED:-true}
      MEDIA_MAX_PARTICIPANTS: ${MEDIA_MAX_PARTICIPANTS:-20}
      MEDIA_LISTEN_IP: ${MEDIA_LISTEN_IP:-0.0.0.0}
      MEDIA_ANNOUNCED_IP: ${MEDIA_ANNOUNCED_IP:-host.docker.internal}
      MEDIA_MIN_PORT: ${MEDIA_MIN_PORT:-40000}
      MEDIA_MAX_PORT: ${MEDIA_MAX_PORT:-40100}
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-}
      MICROSOFT_CALENDAR_CLIENT_ID: ${MICROSOFT_CALENDAR_CLIENT_ID:-}
      MICROSOFT_CALENDAR_CLIENT_SECRET: ${MICROSOFT_CALENDAR_CLIENT_SECRET:-}
      MICROSOFT_CALENDAR_REDIRECT_URI: ${MICROSOFT_CALENDAR_REDIRECT_URI:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME_API:-corelia-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT_DOCKER:-http://tempo:4318}
    ports:
      - "4000:4000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        PNPM_VERSION: ${PNPM_VERSION:-9.12.3}
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY_DOCKER:-0b142799e2fb202684f31eff9ea71965d84e81a4b7a58adb6e90d704165f9773}
        NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL_DOCKER:-/collab}
        NEXT_PUBLIC_DOCS_DEBUG: ${NEXT_PUBLIC_DOCS_DEBUG:-false}
    container_name: corelia-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_DOCKER:-/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL_DOCKER:-}
      NEXT_PUBLIC_SOCKET_PATH: /ws/socket.io
      NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY_DOCKER:-0b142799e2fb202684f31eff9ea71965d84e81a4b7a58adb6e90d704165f9773}
      NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL_DOCKER:-/collab}
      NEXT_PUBLIC_DOCS_DEBUG: ${NEXT_PUBLIC_DOCS_DEBUG:-false}
    ports:
      - "3000:3000"

  hocuspocus:
    build:
      context: ..
      dockerfile: apps/hocuspocus/Dockerfile
    container_name: corelia-hocuspocus
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOCUSPOCUS_HOST: ${HOCUSPOCUS_HOST:-0.0.0.0}
      HOCUSPOCUS_PORT: ${HOCUSPOCUS_PORT:-1234}
      HOCUSPOCUS_QUIET: ${HOCUSPOCUS_QUIET:-false}
    ports:
      - "1234:1234"

  workers:
    build:
      context: ..
      dockerfile: apps/workers/Dockerfile
    container_name: corelia-workers
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-corelia}:${POSTGRES_PASSWORD:-0bdd43b2d74c99a4088e92d74a5eafc62bf503e8b899daef}@postgres:5432/${POSTGRES_DB:-corelia}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-corelia_redis_pwd}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: false
      SMTP_USER: ${SMTP_USER:-corelia}
      SMTP_PASS: ${SMTP_PASS:-corelia}
      SMTP_FROM: ${SMTP_FROM:-noreply@corelia.local}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-coreliaadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-corelia_minio_pwd_123}
      MINIO_BUCKET: ${MINIO_BUCKET:-corelia-files}
      DOCUMENTS_PURGE_INTERVAL_MINUTES: ${DOCUMENTS_PURGE_INTERVAL_MINUTES:-60}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME_WORKERS:-corelia-workers}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT_DOCKER:-http://tempo:4318}

  nginx:
    image: nginx:1.27-alpine
    container_name: corelia-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
      - hocuspocus
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  tempo_data:
