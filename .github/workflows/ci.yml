name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client & build shared packages
        run: |
          pnpm prisma:generate
          pnpm --filter @corelia/types build
          pnpm --filter @corelia/ui build

      - name: Check compose secrets
        run: pnpm security:check-compose

      - name: Check unsafe runtime casts baseline
        run: pnpm security:check-unsafe-casts

      - name: Check Swiss design system conformance
        run: pnpm style:check-swiss

      - name: Check DB PUML sync
        run: pnpm db:diagram:check

      - name: Lint
        run: |
          pnpm --filter @corelia/api lint
          pnpm --filter @corelia/web lint
          pnpm --filter @corelia/workers lint
          pnpm --filter @corelia/types lint
          pnpm --filter @corelia/ui lint
          pnpm --filter @corelia/hocuspocus lint

      - name: Typecheck
        run: |
          pnpm --filter @corelia/api typecheck
          pnpm --filter @corelia/web typecheck
          pnpm --filter @corelia/workers typecheck
          pnpm --filter @corelia/types typecheck
          pnpm --filter @corelia/ui typecheck
          pnpm --filter @corelia/hocuspocus typecheck

      - name: Test
        run: |
          pnpm --filter @corelia/api test
          pnpm --filter @corelia/web test
          pnpm --filter @corelia/workers test
          pnpm --filter @corelia/types test
          pnpm --filter @corelia/ui test
          pnpm --filter @corelia/hocuspocus test

      - name: Build
        run: pnpm build

      - name: Runtime audit (high+critical)
        run: pnpm security:audit

  integration-db:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: corelia_test
          POSTGRES_PASSWORD: corelia_test
          POSTGRES_DB: corelia_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U corelia_test -d corelia_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://corelia_test:corelia_test@localhost:5433/corelia_test?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client & build shared packages
        run: |
          pnpm prisma:generate
          pnpm --filter @corelia/types build

      - name: Integration tests (real DB)
        run: pnpm --filter @corelia/api test:db

  e2e-collab:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @corelia/web exec playwright install --with-deps chromium

      - name: Collaboration E2E (Hocuspocus + Y.js)
        run: pnpm --filter @corelia/web test:e2e
